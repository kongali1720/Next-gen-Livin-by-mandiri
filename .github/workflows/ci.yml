name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. Validasi OpenAPI YAML agar tidak ada penulisan format yang salah
    - name: Validate OpenAPI Specification
      uses: char0n/swagger-editor-validate-action@v2
      with:
        definition-file: docs/04-arsitektur-tren.md

    # 2. Setup Java Environment untuk build kode Kotlin
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Langkah simulasi kompilasi kode Kotlin (Jika menggunakan Gradle)
    # - name: Build with Gradle
    #   run: ./gradlew build
